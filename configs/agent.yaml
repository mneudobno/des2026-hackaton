# Single tuning surface for the agent runtime.
#
# Profiles available:
#   - Mac dev (default active below)
#   - ZGX Nano with Ollama (cheap/easy fallback)
#   - ZGX Nano with vLLM serving Nemotron / Qwen (day-of primary — vLLM is
#     pre-installed on the ZGX boxes per the organizer email 2026-05-05)
# Swap by copy/pasting blocks — no code changes needed.
#
# Day-of provided models (confirm exact HF/NIM identifier at event start):
#   - NVIDIA Nemotron 3 Nano Omni (multimodal — likely fills BOTH llm + vlm)
#   - Qwen 3.6 35B A3B (LLM, MoE-style)

llm:
  # DAYOF: B — flip provider/model/base_url to match DAY_OF_DECISIONS.md §2.
  # Mac dev default: qwen2.5:7b (was :1.5b — swapped up for spatial reasoning).
  provider: ollama          # ollama | nim | openai-compat
  model: qwen2.5:7b
  base_url: http://localhost:11434
  # Optional failover list — on connect/read-timeout the adapter transparently
  # rotates to the next healthy host. Use when two ZGX boxes are available:
  #   base_url: http://zgx-a:8000/v1
  #   base_urls: [http://zgx-b:8000/v1]     # primary first, rest are failover
  temperature: 0.3
  max_tokens: 512

  # --- ZGX Nano: Ollama (simple fallback) ---
  # provider: ollama
  # model: qwen2.5:14b-instruct
  # base_url: http://<zgx-a>:11434

  # --- ZGX Nano: vLLM + Nemotron 3 Nano Omni (day-of primary) ---
  # provider: openai-compat
  # model: nvidia/Nemotron-3-Nano-Omni       # confirm exact tag served by vLLM
  # base_url: http://<zgx-a>:8000/v1

  # --- ZGX Nano: vLLM + Qwen 3.6 35B A3B (LLM-only alternative) ---
  # provider: openai-compat
  # model: Qwen/Qwen3-A3B                    # confirm exact tag served by vLLM
  # base_url: http://<zgx-a>:8000/v1

vlm:
  # DAYOF: B — pick VLM model per DAY_OF_DECISIONS.md §3. Set frame_fps: 0 if vision is irrelevant.
  # Ollama tag is `qwen2.5vl:7b` (no dash).
  provider: ollama
  model: qwen2.5vl:7b
  base_url: http://localhost:11434
  frame_fps: 2
  downscale_to: 768

  # --- ZGX Nano: vLLM + Nemotron 3 Nano Omni (multimodal — same endpoint as LLM) ---
  # provider: openai-compat
  # model: nvidia/Nemotron-3-Nano-Omni       # confirm exact tag served by vLLM
  # base_url: http://<zgx-a>:8000/v1
  #
  # If Omni's vision is weak/unavailable, fall back to qwen2.5vl:7b via Ollama on
  # the laptop, or any VL container we can stand up on the second ZGX.

# Intent router — small LLM that triages input before the big planner.
# Unset this block to disable routing (planner handles every turn).
router:
  # DAYOF: B — enable only if challenge is conversational (Decisions §4).
  enabled: false                 # flip to true once phi3:mini is pulled
  provider: ollama
  model: phi3:mini               # ~3.8B. `qwen2.5:1.5b` is an alternative.
  base_url: http://localhost:11434
  # Routes that skip the full planner and use cheap canned behavior:
  shortcut_routes: [chit_chat]

stt:
  # Mac dev: faster-whisper.
  provider: faster-whisper
  model: large-v3-turbo
  language: en
  vad: silero

  # --- ZGX Nano: NVIDIA Riva Parakeet (preinstalled on DGX OS) ---
  # provider: riva
  # model: nvidia/riva-parakeet-ctc-1.1B
  # server: grpc://<zgx-b>:50051

tts:
  # Mac dev: Piper if installed, else macOS `say`.
  provider: piper
  voice: en_US-amy-medium
  barge_in: true

  # --- ZGX Nano: Kokoro (preferred, 82 M, very fluent, used by NVIDIA) ---
  # provider: kokoro
  # model: hexgrad/Kokoro-82M
  # voice: af_heart

agent:
  tick_hz: 5
  max_tool_calls_per_turn: 5     # NVIDIA's NAT default; safety cap on spirals.
  # When two inference hosts are available (e.g. ZGX-A for LLM, ZGX-B for VLM),
  # flip this to run VLM(frame_N) and planner(obs_{N-1}) concurrently.
  # Tick latency ≈ max(vlm_ms, planner_ms) instead of their sum. Planner sees a
  # one-tick-stale observation — acceptable at 5 Hz; obstacle avoidance still
  # runs every tick. Default false keeps single-host behaviour identical.
  pipeline_parallel: false
  # DAYOF: B — replace system_prompt + observation_prompt with the profile from Decisions §8.
  system_prompt: |
    You are a physical-robot agent. You receive observations from cameras,
    microphones, and robot state, and choose tools to act.

    STRICT RULE: only act when the transcript begins with a `[PLAN] Step X/N: '...'`
    line. When such a line is present, emit tool calls that execute EXACTLY that step.
    When there is no `[PLAN] Step` line in the transcript, return `{"calls": []}` —
    do nothing. Never invent filler behaviour.

    Act decisively within the current step; speak briefly when useful.

  observation_prompt: |
    List only what is clearly visible. If uncertain, say "uncertain".
    Fields: objects (with rough positions), scene summary (<=15 words),
    one salient event if any, else null.

robot:
  # DAYOF: R — set to the adapter chosen in DAY_OF_DECISIONS.md §1.
  adapter: mock                  # mock | http | ros2 | lerobot | <new-class>
  command_rate_hz: 10
  # Continuous-tracking safety net between VLM calls (HALO / ByteTrack pattern).
  tracker:
    # DAYOF: B — enable on latency fallback (Decisions §7) or when tracking a moving target.
    enabled: true
    type: csrt                   # cv2 CSRT — robust, ~60 FPS on laptop
  safety:
    # DAYOF: R — tighten to actual robot limits (intake §3 "Known safety limits").
    max_linear_speed: 0.9        # m/s (3× for snappy rehearsal)
    max_angular_speed: 1.8       # rad/s (3× — ~103°/step)
  calibration:
    # DAYOF: R — measure actual robot drift then adjust these. 1.0 = perfect.
    # If robot consistently undershoots by 15%, set to 1.18 (1/0.85).
    linear_scale: 1.0
    angular_scale: 1.0
    # DAYOF: R — set true for real robots that can't strafe backward.
    # When true, return-to-origin emits: turn toward target → walk forward → turn back.
    # When false (default), uses body-frame dx/dy directly (works for omnidirectional / sim).
    prefer_forward_walk: true
    # DAYOF: R — physical footprint + path-planner clearance. All distances in metres.
    # robot_radius is the body's circular approximation; grow it if the gripper
    # sticks out. extra_clearance is a safety margin added on top of robot+obstacle
    # radius when A* rasterises the grid.
    robot_radius: 0.08
    extra_clearance: 0.03
    # A* grid resolution. Smaller = more precise but slower; stay <= robot_radius.
    planner_cell_size: 0.05
    # Reactive sidestep sizes emitted by check_obstacle_avoidance when an obstacle
    # appears ahead and A* isn't active (or fails). Scale with robot footprint.
    reactive_dodge_m: 0.2
    reactive_advance_m: 0.25

logging:
  jsonl_dir: runs/
  video: true
