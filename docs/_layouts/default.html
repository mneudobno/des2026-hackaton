<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0A1628;
    --bg-soft: #102134;
    --bg-card: #142A45;
    --bg-code: #0d1f33;
    --green: #76B900;
    --green-soft: #99D633;
    --orange: #FF8C00;
    --teal: #00BCD4;
    --text: rgba(255,255,255,0.92);
    --text-soft: rgba(255,255,255,0.74);
    --text-mute: rgba(255,255,255,0.5);
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(118,185,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    word-wrap: break-word;
  }

  body {
    background:
      radial-gradient(ellipse at top right, rgba(118,185,0,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 110%, rgba(255,140,0,0.06) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }

  /* ============== TOP NAV ============== */
  .topnav {
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .topnav .brand {
    color: var(--green); font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    text-decoration: none;
  }
  .topnav .brand .dot { color: var(--orange); }
  .topnav .brand:hover { color: var(--green-soft); }
  .topnav .nav-links {
    display: flex; gap: 18px; font-size: 12px;
    align-items: center;
  }
  .topnav .nav-links a {
    color: var(--text-soft); text-decoration: none;
    transition: color 0.15s;
  }
  .topnav .nav-links a:hover { color: var(--green); }
  .topnav .nav-links .pill {
    color: var(--bg) !important;
    background: var(--green);
    padding: 5px 11px; border-radius: 4px;
    font-weight: 700; letter-spacing: 0.3px;
  }
  .topnav .nav-links .pill:hover { background: var(--green-soft); }

  /* ============== PAGE FRAME ============== */
  .frame {
    max-width: 820px; margin: 0 auto;
    padding: 48px 28px 80px;
  }

  .page-eyebrow {
    color: var(--green); font-size: 11px; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .page-title {
    font-size: 38px; font-weight: 800; line-height: 1.15;
    margin-bottom: 28px; color: white; letter-spacing: -0.5px;
  }

  /* ============== MARKDOWN CONTENT ============== */
  .md-content { font-size: 15px; }

  .md-content h1 {
    font-size: 32px; font-weight: 800; color: white;
    margin: 0 0 24px; line-height: 1.2; letter-spacing: -0.3px;
    padding-bottom: 14px; border-bottom: 1px solid var(--line-strong);
  }

  .md-content h2 {
    font-size: 24px; font-weight: 700; color: white;
    margin: 44px 0 16px; line-height: 1.25;
    padding-bottom: 8px; border-bottom: 1px solid var(--line);
  }

  .md-content h3 {
    font-size: 18px; font-weight: 700; color: var(--green);
    margin: 32px 0 12px; line-height: 1.3;
  }

  .md-content h4 {
    font-size: 15px; font-weight: 700; color: var(--orange);
    margin: 24px 0 10px;
  }

  .md-content p {
    margin: 0 0 16px;
    color: var(--text-soft);
  }

  .md-content strong { color: white; font-weight: 600; }
  .md-content em { color: rgba(255,140,0,0.85); font-style: italic; }

  .md-content a {
    color: var(--green); text-decoration: none;
    border-bottom: 1px dashed rgba(118,185,0,0.4);
    transition: all 0.15s;
  }
  .md-content a:hover {
    color: var(--green-soft); border-bottom-style: solid;
  }

  .md-content ul, .md-content ol {
    margin: 0 0 16px 24px; padding: 0;
    color: var(--text-soft);
  }
  .md-content li { margin-bottom: 6px; line-height: 1.6; }
  .md-content li > ul, .md-content li > ol { margin-top: 6px; margin-bottom: 6px; }

  /* Checkboxes for our DAY_OF_BRIEF style */
  .md-content input[type="checkbox"] {
    margin-right: 8px; accent-color: var(--green);
  }
  .md-content ul.task-list-item { list-style: none; }

  /* Tables */
  .md-content table {
    width: 100%; border-collapse: collapse;
    margin: 18px 0; font-size: 13.5px;
    background: var(--bg-card); border-radius: 6px; overflow: hidden;
  }
  .md-content thead { background: rgba(118,185,0,0.08); }
  .md-content th {
    text-align: left; padding: 10px 14px;
    color: var(--green); font-weight: 700; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 1px solid var(--line-strong);
  }
  .md-content td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    color: var(--text-soft); vertical-align: top; line-height: 1.55;
  }
  .md-content tr:last-child td { border-bottom: none; }
  .md-content tr:hover td { background: rgba(255,255,255,0.02); }
  .md-content td strong { color: white; }

  /* Inline code */
  .md-content code {
    background: var(--bg-code);
    color: var(--green-soft);
    padding: 2px 6px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    border: 1px solid rgba(118,185,0,0.15);
  }

  /* Code blocks */
  .md-content pre {
    background: var(--bg-code);
    padding: 16px 18px;
    border-radius: 6px;
    margin: 16px 0;
    overflow-x: auto;
    border: 1px solid var(--line);
    border-left: 3px solid var(--green);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .md-content pre code {
    background: transparent; border: none; padding: 0;
    color: var(--text); font-size: inherit;
  }

  /* Blockquotes */
  .md-content blockquote {
    border-left: 3px solid var(--orange);
    padding: 4px 0 4px 16px;
    margin: 16px 0;
    color: var(--text-soft);
    font-style: italic;
    background: rgba(255,140,0,0.05);
  }
  .md-content blockquote p { margin: 6px 0; }

  /* Horizontal rule */
  .md-content hr {
    border: none; height: 1px;
    background: var(--line-strong);
    margin: 36px 0;
  }

  /* ============== FOOTER ============== */
  .pgfoot {
    border-top: 1px solid var(--line);
    margin-top: 64px;
    padding: 32px 0 24px;
    text-align: center;
    font-size: 11px; color: var(--text-mute);
    letter-spacing: 0.4px;
  }
  .pgfoot a {
    color: var(--green); text-decoration: none;
    border-bottom: 1px dashed rgba(118,185,0,0.3);
  }
  .pgfoot a:hover { color: var(--green-soft); }

  /* ============== TABLET / SMALL DESKTOP ============== */
  @media (max-width: 720px) {
    .frame { padding: 28px 16px 60px; }
    .topnav { padding: 10px 14px; flex-wrap: wrap; gap: 10px; }
    .topnav .brand-suffix { display: none; }
    .topnav .nav-links { gap: 14px; font-size: 11.5px; }
    .topnav .nav-links a { white-space: nowrap; }
    .topnav .nav-links .pill { padding: 4px 10px; }
    .page-title { font-size: 26px; margin-bottom: 22px; }
    .md-content { font-size: 14.5px; line-height: 1.6; }
    .md-content h1 { font-size: 22px; margin-bottom: 18px; padding-bottom: 10px; }
    .md-content h2 { font-size: 18px; margin: 32px 0 12px; }
    .md-content h3 { font-size: 16px; margin: 24px 0 10px; }
    .md-content h4 { font-size: 14px; margin: 18px 0 8px; }
    .md-content table { display: block; overflow-x: auto; font-size: 12.5px; }
    .md-content table th { font-size: 10px; padding: 8px 10px; }
    .md-content table td { padding: 9px 10px; }
    .md-content pre { font-size: 11.5px; padding: 12px; border-radius: 4px; }
    .md-content code { font-size: 0.86em; padding: 1px 4px; }
    .md-content ul, .md-content ol { margin-left: 20px; }
  }

  /* ============== PHONE (very narrow) ============== */
  @media (max-width: 420px) {
    .frame { padding: 24px 14px 50px; }
    .topnav .brand { font-size: 10px; letter-spacing: 2.2px; }
    .topnav .nav-links { gap: 10px; font-size: 11px; }
    .topnav .nav-links a:not(.pill) {
      /* Hide the emoji prefix inside link text on tiny screens — saves px. */
      max-width: 70px; overflow: hidden; text-overflow: ellipsis;
    }
    .page-title { font-size: 22px; }
    .md-content table { font-size: 11.5px; }
    .md-content pre { font-size: 10.5px; padding: 10px; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <a href="{{ '/' | relative_url }}" class="brand">Just Build<span class="brand-suffix"> <span class="dot">·</span> Team brief</span></a>
  <div class="nav-links">
    <a href="{{ '/team_briefing.html' | relative_url }}">📊 Slides</a>
    <a href="{{ '/REF.html' | relative_url }}">REF</a>
    <a href="{{ '/TECH_STACK.html' | relative_url }}">Stack</a>
    <a href="{{ '/' | relative_url }}" class="pill">Home</a>
  </div>
</nav>

<div class="frame">
  {% if page.eyebrow %}<div class="page-eyebrow">{{ page.eyebrow }}</div>{% endif %}
  {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
  <article class="md-content">
    {{ content }}
  </article>
</div>

<div class="pgfoot">
  Source: <a href="https://github.com/mneudobno/des2026-hackaton">github.com/mneudobno/des2026-hackaton</a>
  · <a href="{{ '/' | relative_url }}">Back to brief</a>
  · <a href="{{ '/team_briefing.html' | relative_url }}">Open slides</a>
</div>

</body>
</html>
